<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    var path = location.pathname.replace(/^\/Portafolio/, '') || '/';
    sessionStorage.redirect = path;
    location.replace('/Portafolio/');
  </script>
</head>
<body>
  <p>Redirecting to <a href="/Portafolio/">Portafolio</a>...</p>
</body>
</html>
