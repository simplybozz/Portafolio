<section class="portfolio section active" id="portfolio" [class.open]="sectionService.isAsideOpen()">
  <div class="container">
    <div class="row">
      <app-section-title title="Portafolio" />
    </div>
    <div class="row">
      <div class="portfolio-heading padd-15">
        <h2>Mis ultimos proyectos:</h2>
      </div>
    </div>
    <div class="row">
      @for (item of portfolioItems; track item.link) {
        <div class="portfolio-item padd-15">
          <div class="portfolio-item-inner shadow-dark">
            <div class="portfolio-img">
              <a [href]="item.link" target="_blank">
                <img [src]="item.image" alt="">
              </a>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
